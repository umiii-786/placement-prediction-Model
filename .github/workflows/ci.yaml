name: Placement-Prediction-Model-DEV-workflow

on:
  push:

jobs:
  pipeline-checking:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v6

      - name: install python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: run pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          dvc repro

      - name: checking Model Overfitting and Accuracy Threshold
        run: python -m unittest testing.checking_model